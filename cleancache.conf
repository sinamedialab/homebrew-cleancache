# cleancache configuration file
# Location: ~/.cleancache.conf
#
# Copy this file to your home directory:
#   cp "$(brew --prefix)/share/cleancache/cleancache.conf" ~/.cleancache.conf
#
# Set any value to "false" to permanently skip that section.
# CLI flags (-v, -i) always override these settings.
# Sections whose paths do not exist on your machine are always skipped automatically.

# ---------------------------------------------------------------------------
# BEHAVIOUR
# ---------------------------------------------------------------------------
VERBOSE=false         # Show each deleted path (-v flag)
INTERACTIVE=false     # Prompt before each section (-i flag)

# ---------------------------------------------------------------------------
# SYSTEM
# ---------------------------------------------------------------------------
CLEAN_SYSTEM=true          # /Library/Caches, /private/var/log, /private/tmp
CLEAN_DIAGNOSTICS=true     # Crash reports and diagnostic logs

# ---------------------------------------------------------------------------
# BROWSERS
# ---------------------------------------------------------------------------
CLEAN_CHROME=true          # Google Chrome
CLEAN_FIREFOX=true         # Mozilla Firefox
CLEAN_SAFARI=true          # Apple Safari
CLEAN_BRAVE=true           # Brave Browser
CLEAN_OPERA=true           # Opera
CLEAN_EDGE=true            # Microsoft Edge
CLEAN_ARC=true             # Arc Browser

# ---------------------------------------------------------------------------
# APPLE APPS
# ---------------------------------------------------------------------------
CLEAN_USER_CACHES=true     # ~/Library/Caches and ~/Library/Logs (all apps)
CLEAN_MAIL=true            # Apple Mail downloads and caches

# ---------------------------------------------------------------------------
# APPLE DEVELOPER
# ---------------------------------------------------------------------------
CLEAN_XCODE=true           # Xcode DerivedData, archives, device support, simulators
CLEAN_SWIFTPM=true         # Swift Package Manager cache

# ---------------------------------------------------------------------------
# BUILD & PACKAGE MANAGERS
# ---------------------------------------------------------------------------
CLEAN_FLUTTER=true         # Flutter SDK and Dart tool caches
CLEAN_GRADLE=true          # Gradle build cache, daemon, wrapper distributions
CLEAN_MAVEN=true           # Maven local repository (~/.m2)
CLEAN_NPM=true             # npm package cache
CLEAN_YARN=true            # Yarn package cache
CLEAN_PNPM=true            # pnpm package store and cache
CLEAN_BUN=true             # Bun install cache
CLEAN_DENO=true            # Deno module cache
CLEAN_PUB=true             # Dart pub package cache
CLEAN_CARGO=true           # Rust Cargo registry cache
CLEAN_COMPOSER=true        # PHP Composer cache
CLEAN_COCOAPODS=true       # CocoaPods download and spec cache
CLEAN_PYTHON=true          # pip, poetry, pyenv, __pycache__, .pyc files
CLEAN_RUBY=true            # Ruby gems and Bundler cache
CLEAN_GO=true              # Go build cache and module cache
CLEAN_RUST=true            # Rustup downloads and temp files
CLEAN_ELIXIR=true          # Elixir Mix archives and Hex package cache
CLEAN_HASKELL=true         # Haskell Stack and Cabal package stores
CLEAN_NVM=true             # NVM internal cache
CLEAN_RVM=true             # RVM archives, logs, temp files
CLEAN_SDKMAN=true          # SDKMAN archives and temp files

# ---------------------------------------------------------------------------
# CONTAINERS & VMs
# ---------------------------------------------------------------------------
CLEAN_DOCKER=true          # Docker build cache + docker system prune
CLEAN_PODMAN=true          # Podman cache + podman system prune
CLEAN_VAGRANT=true         # Vagrant temp and cache files
CLEAN_VIRTUALBOX=true      # VirtualBox caches and VM logs
CLEAN_VMWARE=true          # VMware Fusion caches and VM logs
CLEAN_PARALLELS=true       # Parallels Desktop caches and VM logs

# ---------------------------------------------------------------------------
# IDEs & EDITORS
# ---------------------------------------------------------------------------
CLEAN_VSCODE=true          # Visual Studio Code caches and workspace storage
CLEAN_CURSOR=true          # Cursor IDE caches and workspace storage
CLEAN_JETBRAINS=true       # JetBrains IDEs (IntelliJ, WebStorm, PyCharm, GoLand, etc.)
CLEAN_SUBLIME=true         # Sublime Text caches

# ---------------------------------------------------------------------------
# GAME / CREATIVE ENGINES
# ---------------------------------------------------------------------------
CLEAN_ANDROID=true         # Android SDK build cache and temp files
CLEAN_UNITY=true           # Unity asset store and editor caches
CLEAN_UNREALENGINE=true    # Unreal Engine DerivedDataCache and launcher cache

# ---------------------------------------------------------------------------
# CREATIVE APPS
# ---------------------------------------------------------------------------
CLEAN_ADOBE=true           # Adobe Creative Cloud shared media cache (Premiere, AE, etc.)
CLEAN_FINALCUT=true        # Final Cut Pro render files, analysis files, caches
CLEAN_LOGIC=true           # Logic Pro and GarageBand caches
CLEAN_DAVINCI=true         # DaVinci Resolve logs and caches
CLEAN_SKETCH=true          # Sketch caches
CLEAN_FIGMA=true           # Figma caches and GPU cache

# ---------------------------------------------------------------------------
# COMMUNICATION & MEDIA
# ---------------------------------------------------------------------------
CLEAN_SLACK=true           # Slack caches and logs
CLEAN_ZOOM=true            # Zoom caches and logs
CLEAN_TEAMS=true           # Microsoft Teams caches and logs
CLEAN_DISCORD=true         # Discord caches
CLEAN_SPOTIFY=true         # Spotify persistent cache
CLEAN_TELEGRAM=true        # Telegram media cache
CLEAN_WHATSAPP=true        # WhatsApp caches
CLEAN_SIGNAL=true          # Signal caches
CLEAN_SKYPE=true           # Skype caches
CLEAN_VIBER=true           # Viber caches

# ---------------------------------------------------------------------------
# API & NETWORK TOOLS
# ---------------------------------------------------------------------------
CLEAN_POSTMAN=true         # Postman caches and logs
CLEAN_INSOMNIA=true        # Insomnia caches
CLEAN_CHARLES=true         # Charles Proxy caches and logs
CLEAN_PROXYMAN=true        # Proxyman caches and logs
CLEAN_WIRESHARK=true       # Wireshark caches and logs

# ---------------------------------------------------------------------------
# DATABASE TOOLS
# ---------------------------------------------------------------------------
CLEAN_TABLEPLUS=true       # TablePlus caches and logs
CLEAN_SEQUELACE=true       # Sequel Ace caches and logs
CLEAN_DBEAVER=true         # DBeaver caches and metadata logs
CLEAN_MYSQLWB=true         # MySQL Workbench caches and logs

# ---------------------------------------------------------------------------
# GIT CLIENTS
# ---------------------------------------------------------------------------
CLEAN_TOWER=true           # Tower git client caches and logs
CLEAN_SOURCETREE=true      # SourceTree caches and logs
CLEAN_GITKRAKEN=true       # GitKraken caches and logs

# ---------------------------------------------------------------------------
# TERMINALS
# ---------------------------------------------------------------------------
CLEAN_ITERM2=true          # iTerm2 caches
CLEAN_WARP=true            # Warp terminal caches and logs
CLEAN_HYPER=true           # Hyper terminal caches and logs

# ---------------------------------------------------------------------------
# CLOUD STORAGE
# ---------------------------------------------------------------------------
CLEAN_DROPBOX=true         # Dropbox caches and logs
CLEAN_ONEDRIVE=true        # OneDrive caches and logs
CLEAN_GOOGLEDRIVE=true     # Google Drive caches and logs

# ---------------------------------------------------------------------------
# LAUNCHERS
# ---------------------------------------------------------------------------
CLEAN_ALFRED=true          # Alfred caches
CLEAN_RAYCAST=true         # Raycast caches

# ---------------------------------------------------------------------------
# VPN
# ---------------------------------------------------------------------------
CLEAN_NORDVPN=true         # NordVPN logs
CLEAN_EXPRESSVPN=true      # ExpressVPN logs
CLEAN_MULLVAD=true         # Mullvad VPN logs

# ---------------------------------------------------------------------------
# DEVOPS / CLOUD CLIs
# ---------------------------------------------------------------------------
CLEAN_TERRAFORM=true       # Terraform plugin cache and .terraform lock files
CLEAN_ANSIBLE=true         # Ansible temp and cache files
CLEAN_AWS=true             # AWS CLI and SSO credential caches
CLEAN_GCLOUD=true          # Google Cloud SDK logs and update files
CLEAN_AZURE=true           # Azure CLI logs and telemetry

# ---------------------------------------------------------------------------
# SHELLS
# ---------------------------------------------------------------------------
CLEAN_ZSH=true             # Zsh session files and completion dumps
CLEAN_BASH=true            # Bash history and session files
CLEAN_FISH=true            # Fish shell generated completions

# ---------------------------------------------------------------------------
# MISC
# ---------------------------------------------------------------------------
CLEAN_TRASH=true           # ~/.Trash
CLEAN_HOMEBREW=true        # brew cleanup --prune=all